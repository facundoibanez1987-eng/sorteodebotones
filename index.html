<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elige tu destino</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Elige tu destino</h1>
        
        <div id="game-area">
            <div class="buttons-container">
                <button id="btn-red" class="game-btn red-btn">Rojo</button>
                <button id="btn-blue" class="game-btn blue-btn">Azul</button>
            </div>
        </div>

        <div id="result-area" class="hidden">
            <h2 id="result-message"></h2>
            <button id="btn-reset" class="reset-btn">Volver a jugar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
